<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="initial-scale=1.0, user-scalable=no">
		<meta charset="utf-8">

		<title>Places | Tanzeem Chowdhury</title>
		
		<link rel="stylesheet" type="text/css" href="../css/lib/bootstrap.min.css">
		<link rel="stylesheet" type="text/css" href="../css/common.css?v=2">
		<link rel="stylesheet" type="text/css" href="../css/places.css?v=2">
	</head>
	<body>
		
		<!-- PLACE LIST -->
		<div class="row">
			<div class="col-sm-12">
				<div class="m-3">

					<!-- SHOW|HIDE BUTTON -->
					<button class="btn btn-success" type="button" data-toggle="collapse" data-target="#placeContainer" aria-expanded="false" aria-controls="placeContainer">
						Show/Hide Places
					</button>


					<!-- COLLAPSABLE AREA -->
					<div id="placeContainer" class="collapse">

						<!-- CARD: FILTERS -->
						<div class="row m-2 mt-3 mb-1">

							<div class="col-sm-12 mt-2 pl-1 pr-1">
								<div class="card h-100 p-2">
									<div class="row filters">
										<div id="filtersRegion" class="col-sm-6">
											<h2>Regions</h2>
										</div>
										<div id="filtersCategories" class="col-sm-6">
											<h2>Categories</h2>
										</div>
									</div>
								</div>
							</div>

						</div>

						<!-- CARDS: PLACES -->
						<div id="placelist" class="row m-2 mt-3"><!-- FILLED IN BY JS --></div>
					</div>
				</div>
			</div>
		</div>

		<!-- MAP -->
		<div class="row">
			<div class="col-sm-12">
				<div id="map"></div>
			</div>
		</div>

		<script type="text/javascript" src="../js/lib/jquery-3.4.1.min.js"></script>
		<script type="text/javascript" src="../js/lib/isotope.pkgd.min.js"></script>
    	<script type="text/javascript" src="../js/lib/bootstrap.bundle.min.js"></script>
		<script type="text/javascript" src="../js/lib/bootstrap.min.js"></script>
		<script src="https://kit.fontawesome.com/f392248482.js" crossorigin="anonymous"></script>

		<script type="text/javascript" src="../js/database/places-data.js?v=2"></script>
		<script type="text/javascript" src="../js/places.js?v=1"></script>

		<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCs7lMxZxOPuP_S8fEwVgJKQfSnJlQ2csU&callback=init"></script>

	</body>
</html>
